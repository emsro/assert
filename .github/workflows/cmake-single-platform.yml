name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        preset: [ debug, asan, ubsan, release ]
        compiler:
          - { cc: gcc-15, cxx: g++-15 }
          - { cc: clang, cxx: clang++ }

    runs-on: ubuntu-latest

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15
        if: ${{ matrix.compiler.cc == 'gcc-15' }}
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  coverage:
    runs-on: ubuntu-latest

    env:
      CC: gcc-15
      CXX: g++-15

    steps:
      - name: Install GCC 15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15

      - name: Set up Python 3.8 for gcovr
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: install gcovr
        run: |
          pip install gcovr
      - uses: actions/checkout@v4

      - run: cmake --workflow --preset coverage

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: _build/cobertura.xml
          badge: true
          format: markdown
          output: both

  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  clang-tidy:
    runs-on: ubuntu-latest

    env:
      CC: gcc-15
      CXX: g++-15

    steps:
      - name: Install GCC 15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake --preset debug

      - name: Check
        run: make clang-tidy

  component-test:
    runs-on: ubuntu-latest

    env:
      CC: gcc-15
      CXX: g++-15

    steps:
      - name: Install GCC 15
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15

      - uses: actions/checkout@v4

      - name: Configure (release)
        run: cmake --preset release

      - name: Build (release)
        run: cmake --build --preset release

      - name: Run component test
        run: sh ci-component-test.sh /tmp/asrt-install _build
